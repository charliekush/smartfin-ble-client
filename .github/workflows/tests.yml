name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build python3 python3-pip
          pip3 install numpy scipy

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSMARTFIN_ENABLE_SIMPLEBLE=OFF

      - name: Build
        run: cmake --build build

      - name: Run butterworth tests
        run: ./build/tests/butterworth/butterworth_test --gtest_output=xml:build/test-results/butterworth.xml

      - name: Run filtfilt oracle tests
        run: ./build/tests/filtfilt/filtfilt_gust_test --gtest_output=xml:build/test-results/filtfilt_gust.xml

      - name: Run filtfilt property tests
        run: ./build/tests/filtfilt/filtfilt_properties_test --gtest_output=xml:build/test-results/filtfilt_properties.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results/
